<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga Details</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">Manga<span>Dex</span></div>
    <a href="index.html" class="back-link">← Back to Home</a>
  </header>

  <main class="manga-detail">
    <div class="detail-wrapper">
      <img id="cover" src="" alt="Manga Cover">
      <div>
        <h1 id="title">Title</h1>
        <p id="synopsis">Loading synopsis...</p>
      </div>
    </div>
  </main>
</body>
<script>
  const manga = JSON.parse(localStorage.getItem('selectedManga'));
  if (manga) {
    document.getElementById('title').textContent = manga.attributes.canonicalTitle;
    document.getElementById('cover').src = manga.attributes.posterImage.large;
    document.getElementById('synopsis').textContent = manga.attributes.synopsis;
  }
</script>
</html>
