<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MangaVerse</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>
  <nav class="navbar">
    <div class="logo">MangaVerse</div>
    <input type="text" id="searchBar" placeholder="Search manga...">
    <div class="nav-buttons">
      <button class="nav-btn">Home</button>
      <button class="nav-btn">Genres</button>
      <button class="nav-btn">Top 5</button>
      <button class="nav-btn">Login/Register</button>
    </div>
  </nav>

  <main>
    <section class="section">
      <h2 class="section-title">Popular Now</h2>
      <div id="popular-scroll" class="scroll-container"></div>
    </section>

    <section class="section">
      <h2 class="section-title">Recently Added</h2>
      <div id="recent-scroll" class="scroll-container"></div>
    </section>

    <section class="section">
      <h2 class="section-title">All-Time Rankings</h2>
      <ul id="weekly-list" class="ranking-list"></ul>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2025 MangaVerse. All rights reserved.</p>
    <div class="social-icons">
      <a href="https://discord.com/" target="_blank" aria-label="Discord">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" alt="Discord">
      </a>
      <a href="https://github.com/" target="_blank" aria-label="GitHub">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733553.png" alt="GitHub">
      </a>
      <a href="https://twitter.com/" target="_blank" aria-label="Twitter">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="Twitter">
      </a>
      <a href="https://reddit.com/" target="_blank" aria-label="Reddit">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111589.png" alt="Reddit">
      </a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
